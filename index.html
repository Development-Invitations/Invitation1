<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Приглашение на свадьбу</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url('images/bg1.avif') center/cover no-repeat fixed;
  color: white;
}

/* заголовок */
.hero {
  text-align: center;
  padding: 40px 20px 20px;
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
}

.subtitle {
  margin-top: 10px;
  font-size: 16px;
}

/* SVG дорога */
svg {
  display: block;
  margin: 0 auto;
  width: 100%;
  max-width: 400px;
  height: 1400px;
}

.path {
  stroke: white;
  stroke-width: 3;
  fill: none;
  stroke-dasharray: 1500;
  stroke-dashoffset: 1500;
  transition: 2s;
}

.point {
  fill: #ff4d6d;
  cursor: pointer;
  opacity: 0;
  transform: scale(0);
  transition: 0.5s;
}

.point.show {
  opacity: 1;
  transform: scale(1);
}

/* МОДАЛКА */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
  flex-direction: column;
}

/* конверт */
.envelope {
  width: 320px;
  height: 200px;
  position: relative;
  perspective: 1000px;
}

.envelope-body {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #fff, #ffe4ec);
  border-radius: 12px;
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
}

.letter {
  position: absolute;
  width: 90%;
  background: white;
  border-radius: 8px;
  padding: 15px;
  text-align: center;
  color: #333;
  transform: translateY(100%);
  transition: 0.6s;
}

.flap {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #ffb6c1, #ff4d6d);
  clip-path: polygon(0 0, 50% 65%, 100% 0);
  transform-origin: top;
  position: absolute;
}

/* анимация */
.open .flap {
  animation: openFlap 0.7s forwards;
}

.open .letter {
  transform: translateY(0);
  transition-delay: 0.5s;
}

@keyframes openFlap {
  to { transform: rotateX(-180deg); }
}

/* кнопка */
.close-btn {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 20px;
}

/* RSVP */
.rsvp-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: #ff4d6d;
  color: white;
  border-radius: 20px;
  text-decoration: none;
}

/* адаптив */
@media (max-width: 600px){
  .names { font-size: 36px; }
}

</style>
</head>

<body>

<div class="hero">
  <div class="names">Алексей & Мария</div>
  <div class="subtitle">Приглашаем вас разделить с нами этот особенный день 💍</div>
</div>

<svg viewBox="0 0 400 1400">

  <path id="path" class="path"
    d="M200 100
       C150 300, 250 500, 200 700
       C150 900, 250 1100, 200 1300"/>

  <circle class="point" cx="200" cy="100" r="10" onclick="openModal(1)"/>
  <circle class="point" cx="210" cy="500" r="10" onclick="openModal(2)"/>
  <circle class="point" cx="189" cy="900" r="10" onclick="openModal(3)"/>

</svg>

<!-- модалка -->
<div class="modal" id="modal">
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="envelope-body">
      <div class="letter" id="letterText"></div>
    </div>
  </div>
  <button class="close-btn" onclick="closeModal()">Закрыть</button>
</div>

<script>

/* анимация дороги */
window.onload = () => {
  document.getElementById("path").style.strokeDashoffset = "0";

  setTimeout(()=>{
    document.querySelectorAll(".point").forEach(p => p.classList.add("show"));
  },1500);
};

/* тексты */
function openModal(step){
  const modal = document.getElementById("modal");
  const envelope = document.getElementById("envelope");
  const letter = document.getElementById("letterText");

  let text = "";

  if(step === 1){
    text = "Дорогой гость 💌<br><br>Мы будем рады видеть вас на нашей свадьбе!";
  }

  if(step === 2){
    text = "📅 10 июня 2026<br>⏰ 18:00";
  }

  if(step === 3){
    text = "📍 Ресторан «Весна»<br><br><a class='rsvp-btn' href='#' target='_blank'>Я приду</a>";
  }

  letter.innerHTML = text;

  modal.style.display = "flex";

  setTimeout(()=>{
    envelope.classList.add("open");
  },100);
}

/* закрытие */
function closeModal(){
  const modal = document.getElementById("modal");
  const envelope = document.getElementById("envelope");

  envelope.classList.remove("open");

  setTimeout(()=>{
    modal.style.display = "none";
  },300);
}

/* клик вне */
document.getElementById("modal").addEventListener("click", e=>{
  if(e.target.id === "modal") closeModal();
});

/* ESC */
document.addEventListener("keydown", e=>{
  if(e.key === "Escape") closeModal();
});

</script>

</body>
</html>
