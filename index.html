<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Приглашение на свадьбу</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat&display=swap" rel="stylesheet">

<style>

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url('images/bg1.avif') center/cover no-repeat fixed;
  color: white;
  padding: 0 20px;
}

/* заголовок */
.hero {
    max-width: 500px;
    margin: 40px auto;
    padding: 30px 20px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
    text-align: center;
    margin-bottom: 0;
}

.names {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
}

.subtitle {
  margin-top: 10px;
  font-size: 16px;
}

/* SVG дорога */
svg {
  display: block;
  margin: 0 auto;
  width: 100%;
  max-width: 400px;
  height: 1400px;
}

.path {
  stroke: white;
  stroke-width: 3;
  fill: none;
  stroke-dasharray: 1500;
  stroke-dashoffset: 1500;
  transition: 2s;
}

.point {
    fill: #ff4d6d;
  cursor: pointer;

  opacity: 0;
  transform: scale(0);
  transition: 0.5s;

  position: relative;
}

.point.show {
  opacity: 1;
  transform: scale(1);
}

.pulse-ring {
  fill: none;
  stroke: #ff4d6d;
  stroke-width: 2;

  opacity: 0;

  transform-origin: center;
}

/* появление */
.point.show + .pulse-ring,
.pulse-ring {
  animation: ripple 2s infinite;
  opacity: 1;
}

@keyframes ripple {
  0% {
    r: 8;
    opacity: 0.8;
  }

  70% {
    r: 25;
    opacity: 0;
  }

  100% {
    opacity: 0;
  }
}

/* МОДАЛКА */
.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.7);
  flex-direction: column;
}

/* конверт */
.envelope {
  width: 320px;
  height: 200px;
  position: relative;
  perspective: 1000px;
}

.envelope-body {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #fff, #ffe4ec);
  border-radius: 0;
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
}

.letter {
  position: absolute;
  width: 90%;
  background: white;
  border-radius: 0;
  padding: 15px;
  text-align: center;
  color: #333;
  transform: translateY(100%);
  transition: 0.6s;
}

.flap {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #ffb6c1, #ff4d6d);
  clip-path: polygon(0 0, 50% 65%, 100% 0);
  transform-origin: top;
  position: absolute;
}

/* анимация */
.open .flap {
  animation: openFlap 0.7s forwards;
}

.open .letter {
  transform: translateY(0);
  transition-delay: 0.5s;
}

@keyframes openFlap {
  to { transform: rotateX(-180deg); }
}

/* кнопка */
.close-btn {
  margin-top: 20px;
  padding: 10px 20px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 20px;
  cursor: pointer;
}

/* RSVP */
.rsvp-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: #ff4d6d;
  color: white;
  border-radius: 20px;
  text-decoration: none;
}

/* адаптив */
@media (max-width: 600px){
  .names { font-size: 36px; }
}

.final-block {
    max-width: 500px;
  margin: 40px auto;
  padding: 30px 20px;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);

  border-radius: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);

  text-align: center;
  margin-top: -101px;
}

  @media (max-width: 480px) {
  .final-block {
    margin-top: -135px;
  }
}

@media (max-width: 375px) {
  .final-block {
    margin-top: -200px;
  }
}

@media (max-width: 376px) {
  .final-block {
    margin-top: -200px;
  }
}

@media (max-width: 360px) {
  .final-block {
    margin-top: -230px;
  }
}
  
@media (max-width: 330px) {
  .final-block {
    margin-top: -270px;
  }
}
  
@media (max-width: 320px) {
  .final-block {
    margin-top: -285px;
  }
}

.final-block h2 {
  font-family: 'Great Vibes', cursive;
  font-size: 32px;
  margin-bottom: 10px;
}

.timer {
    display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin: 20px 0;
}

.timer div {
    background: rgba(255,255,255,0.25);
  border-radius: 12px;
  padding: 12px 8px;
  font-size: 12px;
}

.timer span {
    display: block;
  font-size: 22px;
  font-weight: bold;
}

.location {
    margin: 15px 0;
    font-size: 14px;
}

iframe {
    width: 100%;
  height: 220px;
  border: none;
  border-radius: 15px;
  margin-top: 10px;
}

</style>
</head>

<body>

<div class="hero">
  <div class="names">Алексей & Мария</div>
  <div class="subtitle">Приглашаем вас разделить с нами этот особенный день 💍</div>
</div>

<svg viewBox="0 0 400 1400">

  <path id="path" class="path"
    d="M200 100
       C150 300, 250 500, 200 700
       C150 900, 250 1100, 200 1300"/>

       <g onclick="openModal(1)">
        <circle class="pulse-ring" cx="200" cy="100" r="10"/>
        <circle class="point" cx="200" cy="100" r="8"/>
      </g>
      
      <g onclick="openModal(2)">
        <circle class="pulse-ring" cx="210" cy="500" r="10"/>
        <circle class="point" cx="210" cy="500" r="8"/>
      </g>
      
      <g onclick="openModal(3)">
        <circle class="pulse-ring" cx="190" cy="900" r="10"/>
        <circle class="point" cx="190" cy="900" r="8"/>
      </g>

</svg>

<div class="final-block">

    <h2>Ждём вас 💍</h2>

    <div class="timer">
        <div><span id="days">0</span><br>дней</div>
        <div><span id="hours">0</span><br>часов</div>
        <div><span id="minutes">0</span><br>минут</div>
        <div><span id="seconds">0</span><br>секунд</div>
    </div>

    <div class="location">
        📍 Ресторан «Весна», Ташкент
    </div>

    <iframe 
        src="https://maps.google.com/maps?q=Tashkent&z=13&output=embed">
    </iframe>

</div>

<!-- модалка -->
<div class="modal" id="modal">
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="envelope-body">
      <div class="letter" id="letterText"></div>
    </div>
  </div>
  <button class="close-btn" onclick="closeModal()">Закрыть</button>
</div>

<script>

/* анимация дороги */
window.onload = () => {
  document.getElementById("path").style.strokeDashoffset = "0";

  setTimeout(()=>{
    document.querySelectorAll(".point").forEach(p => p.classList.add("show"));
    document.querySelectorAll(".pulse-ring").forEach(p => p.classList.add("show"));
  },1500);
};

/* тексты */
function openModal(step){
  const modal = document.getElementById("modal");
  const envelope = document.getElementById("envelope");
  const letter = document.getElementById("letterText");

  let text = "";

  if(step === 1){
    text = "Дорогой гость 💌<br><br>Мы будем рады видеть вас на нашей свадьбе!";
  }

  if(step === 2){
    text = "📅 10 июня 2026<br>⏰ 18:00";
  }

  if(step === 3){
    text = "📍 Ресторан «Весна»<br><br><a class='rsvp-btn' href='#' target='_blank'>Я приду</a>";
  }

  letter.innerHTML = text;

  modal.style.display = "flex";

  setTimeout(()=>{
    envelope.classList.add("open");
  },100);
}

/* закрытие */
function closeModal(){
  const modal = document.getElementById("modal");
  const envelope = document.getElementById("envelope");

  envelope.classList.remove("open");

  setTimeout(()=>{
    modal.style.display = "none";
  },300);
}

/* клик вне */
document.getElementById("modal").addEventListener("click", e=>{
  if(e.target.id === "modal") closeModal();
});

/* ESC */
document.addEventListener("keydown", e=>{
  if(e.key === "Escape") closeModal();
});

// дата свадьбы (меняешь тут)
const weddingDate = new Date("March 29, 2026 18:00:00").getTime();

setInterval(() => {

  const now = new Date().getTime();
  const diff = weddingDate - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("days").innerText = days;
  document.getElementById("hours").innerText = hours;
  document.getElementById("minutes").innerText = minutes;
  document.getElementById("seconds").innerText = seconds;

}, 1000);

</script>

</body>
</html>
